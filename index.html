<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EBD - Jovens Luz Eterna</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-area-central">
                <h1>Luz Eterna</h1>
                <p>grupo de jovens</p>
            </div>

            <nav id="nav-principal" style="display: none;">
                <div class="nav-links">
                    <a onclick="navegarPara('tela-dashboard')">Início</a>
                    <a onclick="navegarPara('tela-licoes')">Matérias</a>
                    <a onclick="navegarPara('tela-membros')">Membros</a>
                </div>
                <div class="user-status-bar">
                    <span id="nome-usuario-logado">Usuário</span> 
                    <span id="badge-perfil" class="badge-role"></span>
                    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section id="tela-auth" class="tela ativa">
            <div class="auth-container">
                <div id="auth-login-view">
                    <h2>Entrar</h2>
                    <p class="subtitle">Acesse para registrar sua presença</p>
                    <div id="login-alert" class="alert alert-error" style="display: none;"></div>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="login-nome">
                    </div>
                    <button class="btn-principal" onclick="executarLogin()">Entrar</button>
                    <p style="margin-top:1rem; text-align:center; cursor:pointer;" onclick="alternarAbasAuth(true)">Não tem cadastro? <b>Cadastre-se</b></p>
                </div>

                <div id="auth-cadastro-view" style="display: none;">
                    <h2>Cadastro</h2>
                    <div id="cadastro-alert" class="alert alert-error" style="display: none;"></div>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="cadastro-nome">
                    </div>
                    <button class="btn-principal" onclick="executarCadastro()">Confirmar Registro</button>
                    <p style="margin-top:1rem; text-align:center; cursor:pointer;" onclick="alternarAbasAuth(false)">Voltar ao Login</p>
                </div>
            </div>
        </section>

        <section id="tela-dashboard" class="tela">
            <div id="dashboard-dinamico-conteudo"></div>
        </section>

        <section id="tela-licoes" class="tela">
            <div id="painel-cadastro-licao" style="display: none;"></div>
            <div id="feed-licoes"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Grupo de Jovens Luz Eterna</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
