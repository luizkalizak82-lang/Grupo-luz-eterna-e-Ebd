<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Portal EBD Luz Eterna</title>
</head>
<body>
    <div id="tela-auth" class="tela ativa">
        <div class="card-login">
            <h2>Portal EBD - Luz Eterna</h2>
            <input type="text" id="login-nome" placeholder="Seu Nome Completo">
            <button onclick="executarLogin()">Entrar</button>
        </div>
    </div>

    <div id="tela-dashboard" class="tela" style="display:none;">
        <nav>
            <button onclick="navegar('cronograma')">Cronograma EBD</button>
            <button onclick="navegar('diario')">Diário de Classe</button>
            <button onclick="fazerLogout()">Sair</button>
        </nav>
        
        <div id="painel-professor" style="display:none;">
            <h3>Inserir Aula</h3>
            <input type="text" id="post-tema" placeholder="Tema">
            <input type="text" id="post-pergunta" placeholder="Pergunta">
            <button onclick="publicarAula()">Publicar</button>
        </div>
        
        <div id="feed-licoes" class="conteudo"></div>
        <div id="lista-oficial-membros" class="conteudo"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
