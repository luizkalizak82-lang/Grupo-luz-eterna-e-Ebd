<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Portal EBD Luz Eterna</title>
</head>
<body>
    <div id="tela-auth" class="tela ativa">
        <div class="card">
            <h2>Portal EBD - Luz Eterna</h2>
            <input type="text" id="login-nome" placeholder="Seu Nome Completo">
            <button onclick="executarLogin()">Entrar</button>
            <button onclick="mostrarTela('tela-cadastro')" class="btn-secundario">Cadastrar Novo Aluno</button>
        </div>
    </div>

    <div id="tela-cadastro" class="tela" style="display:none;">
        <div class="card">
            <h2>Novo Cadastro</h2>
            <input type="text" id="novo-nome" placeholder="Nome Completo">
            <button onclick="cadastrarAluno()">Confirmar Cadastro</button>
            <button onclick="mostrarTela('tela-auth')" class="btn-secundario">Voltar</button>
        </div>
    </div>

    <div id="tela-dashboard" class="tela" style="display:none;">
        <nav>
            <button onclick="mudarConteudo('cronograma')">Cronograma</button>
            <button onclick="mudarConteudo('diario')">Diário</button>
            <button onclick="fazerLogout()">Sair</button>
        </nav>
        
        <div id="painel-professor" style="display:none;" class="card">
            <h3>Gerenciar Aulas</h3>
            <input type="text" id="novo-tema" placeholder="Título da Nova Lição">
            <button onclick="adicionarLicao()">Adicionar Lição</button>
        </div>
        
        <div id="feed-licoes" class="conteudo"></div>
        <div id="lista-oficial-membros" class="conteudo" style="display:none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
