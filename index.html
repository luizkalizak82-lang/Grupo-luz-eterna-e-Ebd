<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal Luz Eterna | Escola Bíblica Dominical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header><h1>Luz Eterna</h1></header>

        <section id="login-screen">
            <input type="text" id="user-name" placeholder="Nome (igual WhatsApp)">
            <button onclick="fazerLogin()">Entrar no Painel</button>
        </section>

        <section id="dashboard" style="display:none;">
            <nav>
                <button onclick="mostrar('aula')">Aula Hoje</button>
                <button onclick="mostrar('ebds')">Lições EBD</button>
                <button onclick="mostrar('diario')">Diário</button>
                <button id="tab-admin" style="display:none;" onclick="mostrar('admin')">Admin</button>
            </nav>

            <div id="aula" class="aba">
                <h2 id="titulo-aula">Aguardando início...</h2>
                <div id="timer">Tempo: --:--</div>
                <button id="btn-presenca" onclick="registrarPresenca()">Confirmar Presença</button>
                <textarea id="resp-aluno" placeholder="Responda a pergunta da aula..."></textarea>
                <button onclick="enviarResposta()">Enviar Resposta</button>
                <div class="barra-externa"><div id="barra-progresso"></div></div>
                <p id="status-texto">0/60 presentes</p>
            </div>

            <div id="ebds" class="aba" style="display:none;"></div>
            <div id="diario" class="aba" style="display:none;"><h3>Lista de Jovens</h3><ul id="lista-alunos"></ul></div>
            
            <div id="admin" class="aba" style="display:none;">
                <input id="in-titulo" placeholder="Título da Lição">
                <textarea id="in-versiculos" placeholder="Versículos"></textarea>
                <textarea id="in-pergunta" placeholder="Pergunta da aula"></textarea>
                <button onclick="publicarAula()">Publicar Lição</button>
            </div>
        </section>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
