<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Luz Eterna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo">Luz Eterna</h1>
        <div class="infinito">&infin;</div>
    </header>

    <section id="login-area">
        <div class="card">
            <input type="text" id="user-name" placeholder="Nome igual ao WhatsApp">
            <button class="gold" onclick="entrar()">Entrar / Cadastrar</button>
        </div>
    </section>

    <section id="dashboard" style="display:none;">
        <nav>
            <button onclick="location.reload()">Home</button>
            <button onclick="abrir('aula')">Aula Hoje</button>
            <button onclick="abrir('ebds')">Lições EBD</button>
            <button onclick="abrir('diario')">Diário</button>
        </nav>

        <div id="conteudo-principal"></div>
        
        <div id="admin-panel" class="card admin-only" style="display:none;">
            <h3>Painel do Líder</h3>
            <input type="text" id="in-titulo" placeholder="Título">
            <textarea id="in-texto" placeholder="Textos Bíblicos"></textarea>
            <textarea id="in-pergunta" placeholder="Pergunta da aula"></textarea>
            <button class="gold" onclick="publicarAula()">Publicar Aula</button>
        </div>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
