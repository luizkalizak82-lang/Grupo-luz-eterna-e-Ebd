<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Luz Eterna | Área do Jovem</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-top">
            <img src="logo.png" alt="Luz Eterna Logo" class="logo-img">
        </div>
    </header>

    <main>
        <section id="tela-login" class="tela ativa">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>ÁREA DO JOVEM</h2>
                    <p>Acesse sua EBD</p>
                </div>
                <input type="text" id="login-nome" placeholder="Seu Nome Completo">
                <button class="btn-entrar" onclick="executarLogin()">ENTRAR</button>
                <button class="btn-cadastro" onclick="alternarTela('tela-cadastro')">Solicitar Cadastro</button>
            </div>
        </section>

        <section id="tela-cadastro" class="tela">
            <div class="auth-card">
                <h2>CRIAR CADASTRO</h2>
                <input type="text" id="cad-nome" placeholder="Digite seu nome completo">
                <button class="btn-entrar" onclick="executarCadastro()">REGISTRAR</button>
                <button class="btn-cadastro" onclick="alternarTela('tela-login')">Voltar ao Login</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
