<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBD Luz Eterna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section" class="container">
        <img src="logo.png" alt="Logo Luz Eterna" class="logo-grande">
        <h2>Acesso ao Sistema</h2>
        <input type="text" id="user" placeholder="Nome de usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="app-section" class="container" style="display:none;">
        <header>
            <img src="logo.png" alt="Logo" class="logo-pequena">
            <nav>
                <button onclick="mostrar('licoes')">Lições</button>
                <button onclick="mostrar('avisos')">Avisos</button>
                <button onclick="mostrar('eventos')">Eventos</button>
                <button onclick="logout()" class="btn-sair">Sair</button>
            </nav>
        </header>

        <main id="conteudo-dinamico">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
